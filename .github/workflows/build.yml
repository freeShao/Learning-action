name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Code quality check
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify syntax and imports
        run: |
          python -c "
          import ast
          with open('main.py') as f:
            ast.parse(f.read())
          print('[OK] Syntax is valid')
          from PyQt5.QtWidgets import QApplication
          print('[OK] PyQt5 imports successfully')
          "

  test:
    name: Test Python ${{ matrix.python-version }}
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Qt xcb)
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  package:
    name: Package ${{ matrix.artifact_name }}
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 30
    needs: test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: medical-report-Linux-x64
            artifact_glob: |
              release/medical-report-*.tar.gz
          - os: windows-latest
            artifact_name: medical-report-Windows-x64
            artifact_glob: |
              release/medical-report-*.zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pyinstaller --onedir \
            --name "medical-report" \
            --add-data "README.md:." \
            --collect-all PyQt5 \
            --hidden-import PyQt5.sip \
            main.py

      - name: Package artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          tar -czf release/medical-report-Linux.tar.gz -C dist/medical-report .
          test -f release/medical-report-Linux.tar.gz && echo "Linux tar.gz created"

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p release
          7z a -tzip release/medical-report-Windows.zip ./dist/medical-report/*
          test -f release/medical-report-Windows.zip && echo "Windows zip created"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release Assets
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 20
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find release-artifacts -maxdepth 2 -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
